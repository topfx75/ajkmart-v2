<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Android/PWA viewport — no pinch zoom on app UI -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <title>Vendor Portal — AJKMart</title>

    <!-- PWA / Android -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Vendor" />
    <link rel="manifest" href="/vendor/manifest.json" />

    <!-- Theme / Status Bar -->
    <meta name="theme-color" content="#f97316" />
    <meta name="msapplication-navbutton-color" content="#f97316" />

    <!-- iOS (fallback) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Vendor" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/vendor/favicon.svg" />

    <!-- Google Fonts — Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Nastaliq+Urdu:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      [dir="rtl"], .urdu-text {
        font-family: 'Noto Nastaliq Urdu', serif;
        line-height: 2.0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/vendor/sw.js', { scope: '/vendor/' }).catch(() => {});
        });
      }
    </script>
  </body>
</html>
