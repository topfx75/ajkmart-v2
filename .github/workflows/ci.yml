# ============================================================
#  AJKMart - CI Workflow
#  Triggers: Every push and pull request
#  What it does: Install, typecheck, and build all apps
# ============================================================

name: CI — Build & Typecheck

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build & Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck shared libraries
        run: pnpm run typecheck:libs

      - name: Build API Server
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/ajkmart
          NODE_ENV: production
        run: pnpm --filter @workspace/api-server run build

      - name: Build Admin Panel
        env:
          VITE_API_URL: https://api.example.com/api
          VITE_API_BASE_URL: https://api.example.com
        run: pnpm --filter @workspace/admin run build

      - name: Build Vendor App
        env:
          VITE_API_URL: https://api.example.com/api
          VITE_API_BASE_URL: https://api.example.com
        run: pnpm --filter @workspace/vendor-app run build

      - name: Build Rider App
        env:
          VITE_API_URL: https://api.example.com/api
          VITE_API_BASE_URL: https://api.example.com
        run: pnpm --filter @workspace/rider-app run build

      - name: Upload API build artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-dist
          path: artifacts/api-server/dist/
          retention-days: 7

      - name: Upload Admin build artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-dist
          path: artifacts/admin/dist/
          retention-days: 7
